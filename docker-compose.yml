version: '3.8'

services:
  backend:
    build: .
    container_name: geoai-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app

  frontend:
    build: ./frontend
    container_name: geoai-frontend
    ports:
      - "5173:5173"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend